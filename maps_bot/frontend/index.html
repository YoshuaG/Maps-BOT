<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps Bot Pro</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background element -->
    <div class="bg-gradient"></div>

    <div class="app-wrapper">
        <!-- Left Main Content -->
        <div class="main-column" id="left-pane">
            <div class="container">
                <!-- Header -->
                <header>
                    <h1>Maps Bot <span>Pro</span></h1>
                    <p>Busca inteligente no Google Maps turbinada com Inteligência Artificial</p>
                </header>

                <!-- Search Panel -->
                <section class="glass-panel search-panel">
                    <form id="search-form">
                        <div class="form-group full-width">
                            <label for="query">O que deseja buscar?</label>
                            <input type="text" id="query" placeholder="Ex: hamburgueria artesanal, conserto celular..." required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="location">Localização</label>
                                <input type="text" id="location" placeholder="Ex: Av Paulista, SP (Vazio = Atual)">
                            </div>
                            <div class="form-group">
                                <label for="radius">Raio Máx: <span id="radius-value">5</span> km</label>
                                <input type="range" id="radius" value="5" min="1" max="50" step="1" class="slider">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="max_results">Qtd. Máxima</label>
                                <input type="number" id="max_results" value="5" min="1">
                            </div>
                            <div class="form-group">
                                <label for="min_rating">Nota Mínima: <span id="rating-value">0.0</span></label>
                                <input type="range" id="min_rating" value="0.0" min="0" max="5" step="0.1" class="slider">
                            </div>
                        </div>

                        <div class="form-group checkbox-group">
                            <label class="custom-checkbox">
                                <input type="checkbox" id="apenas_abertos">
                                <span class="checkmark"></span>
                                Apenas locais abertos agora
                            </label>
                        </div>

                        <button type="submit" id="btn-search" class="primary-btn">
                            <span class="btn-text">Iniciar Busca Inteligente</span>
                            <div class="spinner hidden" id="search-spinner"></div>
                        </button>
                    </form>
                </section>

                <!-- Results Panel -->
                <section class="glass-panel results-panel hidden" id="results-section">
                    <div class="panel-header">
                        <h2>Resultados Encontrados</h2>
                        <span class="result-count" id="result-count">0 locais</span>
                    </div>
                    
                    <div class="export-actions">
                        <button class="export-btn" data-format="json">Exportar JSON</button>
                        <button class="export-btn" data-format="csv">Exportar CSV</button>
                        <button class="export-btn" data-format="excel">Exportar Excel</button>
                    </div>

                    <div class="results-grid" id="results-grid">
                        <!-- Cards de resultado serão injetados aqui via JS -->
                    </div>
                </section>

                <!-- Footer -->
                <footer>
                    <div class="footer-content">
                        <p>Criador: <strong>Yoshua Garcia</strong></p>
                        <div class="footer-links">
                            <a href="https://github.com/YoshuaG" target="_blank" rel="noopener noreferrer">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .839-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"></path></svg>
                                GitHub
                            </a>
                            <a href="mailto:Yoshua.gar@gmail.com">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                                Yoshua.gar@gmail.com
                            </a>
                        </div>
                    </div>
                </footer>
            </div>
        </div>

        <!-- Resizer Handle -->
        <div class="resizer" id="resizer">
            <div class="resizer-handle"></div>
        </div>

        <!-- Right Console Column -->
        <aside class="logs-sidebar" id="right-pane">
            <div class="sidebar-content glass-panel">
                <div class="panel-header">
                    <h2>Console de Execução</h2>
                    <span class="status-indicator">Pronto</span>
                </div>
                <div class="logs-container" id="logs-container">
                    <p class="log-entry system">Aguardando início da busca...</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">Notificação</div>

    <script src="script.js"></script>
</body>
</html>
